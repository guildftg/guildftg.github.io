<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FTG Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="../assets/images/ftg_logo.png" type="image/png">

    <style>
      html, body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 40px;
        padding-bottom: 40px;
        background-color: #f8f9fa;
      }
      .form-signin {
        width: 100%;
        max-width: 360px;
        padding: 15px;
        margin: auto;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
      }
      .form-signin .form-floating:focus-within {
        z-index: 2;
      }
      .form-signin input[type="email"],
      .form-signin input[type="password"] {
        margin-bottom: 10px;
        border-radius: 0.375rem;
      }
      .form-signin button {
        margin-top: 10px;
      }
      .error-message {
        color: #dc3545;
        font-size: 0.875rem;
      }
    </style>
  </head>

  <body class="text-center">
    
    <main class="form-signin">
      <form id="login-form">
        <img class="mb-4 rounded-circle" src="../assets/images/ftg_logo.png" alt="FTG Logo" width="128" height="128">
        <h1 class="h3 mb-3 fw-normal">Admin Login</h1>

        <div class="form-floating">
          <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
          <label for="floatingInput">Email address</label>
        </div>

        <div class="form-floating">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
          <label for="floatingPassword">Password</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
        <button class="w-100 btn btn-lg btn-secondary mb-2" type="button" onclick="window.location.href='/register'">
          Register
        </button>
        <p id="error-message" class="error-message mt-4"></p>

        <p class="mt-4 mb-3 text-muted" id="copyright">Copyright &copy; 2026 FTG</p>
      </form>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>

      document.getElementById("copyright").innerHTML = "Copyright © " + new Date().getFullYear() + " FTG";
      
      const supabaseClient = window.supabase.createClient(
        "https://dyshoztfbpgpanqsyveg.supabase.co",
        "sb_publishable_gNVVkMuQLdkmeN5U_kJr4w_8qEkn-Jx"
      );
    
      // Redirect if already logged in
      document.addEventListener("DOMContentLoaded", async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          window.location.href = "/admin/";
        }
      });
    
      // Handle login form
      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
    
        const email = document.getElementById("floatingInput").value;
        const password = document.getElementById("floatingPassword").value;
    
        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });
    
        if (error) {
          document.getElementById("error-message").innerText = error.message;
        } else {
          window.location.href = "/admin/";
        }
      });
    </script>

  </body>
</html>
