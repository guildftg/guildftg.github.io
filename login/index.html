<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FTG Login</title>

    <!-- Bootstrap CSS (CDN instead of missing local files) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      html, body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        padding-top: 40px;
        padding-bottom: 40px;
        background-color: #212529;
        color: white;
      }
      .form-signin {
        max-width: 330px;
        padding: 15px;
      }
    </style>
  </head>

  <body class="text-center">
    
<main class="form-signin w-100 m-auto">
  <form id="login-form">
    <h1 class="h3 mb-3 fw-normal">FTG Guild Login</h1>

    <div class="form-floating">
      <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
      <label for="floatingInput">Email address</label>
    </div>

    <div class="form-floating mt-2">
      <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
      <label for="floatingPassword">Password</label>
    </div>

    <button class="w-100 btn btn-lg btn-primary mt-3" type="submit">
      Sign in
    </button>

    <p id="error-message" class="mt-3 text-danger"></p>
    <p class="mt-5 mb-3 text-muted">FTG Guild</p>
  </form>
</main>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = supabase.createClient(
      "https://dyshoztfbpgpanqsyveg.supabase.co",
      "sb_publishable_gNVVkMuQLdkmeN5U_kJr4w_8qEkn-Jx"
    );
  
    // Redirect if already logged in
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = "/admin/";
      }
    });
  
    // Handle login form
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
  
      const email = document.getElementById("floatingInput").value;
      const password = document.getElementById("floatingPassword").value;
  
      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });
  
      if (error) {
        document.getElementById("error-message").innerText = error.message;
      } else {
        window.location.href = "/admin/";
      }
    });
  </script>

  </body>
</html>
