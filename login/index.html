<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FTG Login</title>

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="d-flex align-items-center py-4 bg-dark text-white">

    <main class="form-signin w-100 m-auto text-center" style="max-width: 330px;">
      
      <h1 class="h3 mb-3 fw-normal">FTG Guild Login</h1>

      <p class="mb-4 text-muted">Sign in to access guild tools</p>

      <button id="discord-login" class="w-100 btn btn-lg btn-primary">
        Login with Discord
      </button>

      <p class="mt-5 mb-3 text-muted">FTG Guild</p>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabase = window.supabase.createClient(
        "https://YOUR_PROJECT.supabase.co",
        "YOUR_ANON_KEY"
      );

      // Redirect if already logged in
      document.addEventListener("DOMContentLoaded", async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          window.location.href = "/";
        }
      });

      // Discord login
      document.getElementById("discord-login").addEventListener("click", async () => {
        await supabase.auth.signInWithOAuth({
          provider: "discord",
          options: {
            redirectTo: window.location.origin
          }
        });
      });
    </script>

  </body>
</html>
