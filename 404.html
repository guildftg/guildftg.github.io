<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found | FTG</title>
  <link rel="icon" href="assets/images/ftg_logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      background-color: #f8f9fa;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .error-container {
      max-width: 500px;
      width: 100%;
      background-color: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.1);
    }
    .error-container img {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
    }
    .error-container h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }
    .error-container p.lead {
      font-size: 1.25rem;
      margin-bottom: 20px;
    }
    .btn-home {
      width: 100%;
      padding: 10px;
      font-size: 1.1rem;
      border-radius: 0.5rem;
    }
    .footer-text {
      margin-top: 20px;
      color: #6c757d;
      font-size: 0.875rem;
    }
  </style>
</head>

<body>
  <div class="error-container">
    <img src="/assets/images/ftg_logo.png" alt="FTG Logo" class="rounded-circle">
    <h1>404</h1>
    <p class="lead">Oops! The page you are looking for cannot be found.</p>
    <p>It might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="../" class="btn btn-primary btn-home">Return Home</a>
    <p class="footer-text">&copy; <span id="year"></span> FTG</p>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
