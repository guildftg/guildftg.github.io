<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord Verification</title>
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <h1 class="mb-4">Discord Verification</h1>

      <!-- Verification code input -->
      <div class="mb-3">
        <label for="codeField" class="form-label">Your Verification Code</label>
        <input type="text" class="form-control text-center" id="codeField" readonly>
      </div>

      <!-- Discord join button -->
      <a id="discordButton" href="https://discord.gg/invitecode" target="_blank" class="btn btn-primary btn-lg">
        Join Discord
      </a>
    </div>
  </div>
</div>

<!-- Optional Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Parse query parameter 'k'
function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param) || '';
}

// Set the code input value
document.getElementById('codeField').value = getQueryParam('k');
</script>

</body>
</html>
