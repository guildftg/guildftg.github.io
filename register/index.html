<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FTG Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body {
        display: flex;
        align-items: center;
        height: 100vh;
        background-color: #212529;
        color: white;
      }
      .form-signup {
        max-width: 330px;
        margin: auto;
        padding: 15px;
      }
    </style>
  </head>

  <body class="text-center">

    <main class="form-signup w-100 m-auto">
      <form id="signup-form">
        <h1 class="h3 mb-3 fw-normal">Create Account</h1>

        <div class="form-floating">
          <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
          <label>Email address</label>
        </div>

        <div class="form-floating mt-2">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <label>Password</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary mt-3" type="submit">
          Sign up
        </button>

        <p id="message" class="mt-3"></p>

        <p class="mt-4">
          Already have an account? <a href="/login">Login</a>
        </p>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabase = supabase.createClient(
        "https://dyshoztfbpgpanqsyveg.supabase.co",
        "sb_publishable_gNVVkMuQLdkmeN5U_kJr4w_8qEkn-Jx"
      );

      document.getElementById("signup-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { data, error } = await supabase.auth.signUp({
          email,
          password
        });

        const msg = document.getElementById("message");

        if (error) {
          msg.innerText = error.message;
          msg.className = "text-danger mt-3";
        } else {
          msg.innerText = "Check your email to confirm your account.";
          msg.className = "text-success mt-3";
        }
      });
    </script>

  </body>
</html>
