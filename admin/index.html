</script>
</head>
<body class="text-center">
  <header class="sticky-top py-1 bg-body">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a href="/">
          <img class="navbar-brand logo px-3 rounded-circle" style="max-height: 90px" src="../assets/images/ftg_logo.png" alt="FTG Guild Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto">

  </header>

  <h1>Welcome to the Dashboard</h1>
  <p id="user-email"></p>
  <button id="logout" class="btn btn-danger mt-3">Log Out</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient(
    "https://dyshoztfbpgpanqsyveg.supabase.co",
    "sb_publishable_gNVVkMuQLdkmeN5U_kJr4w_8qEkn-Jx"
  );

  async function checkAuth() {
    console.log("=== AUTH CHECK START ===");

    const { data: { session }, error: sessionError } =
      await supabaseClient.auth.getSession();

    console.log("Session:", session);
    console.log("Session Error:", sessionError);

    if (!session) {
      console.log("❌ No session (user not logged in)");
      document.getElementById('user-email').innerText =
        "Not logged in";
      return;
    }

    const userId = session.user.id;
    console.log("User ID:", userId);
    console.log("User Email:", session.user.email);

    // 🔍 Query profile
    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('id, role')
      .eq('id', userId)
      .maybeSingle();

    console.log("Profile result:", profile);
    console.log("Profile error:", error);

    if (error) {
      console.log("❌ Profile query failed");
      return;
    }

    if (!profile) {
      console.log("❌ No profile found for this user");
      return;
    }

    console.log("Role from DB:", profile.role);

    if (profile.role?.trim().toLowerCase() !== 'admin') {
      console.log("❌ NOT ADMIN");
      document.getElementById('user-email').innerText =
        `Logged in as: ${session.user.email} (NOT ADMIN)`;
      return;
    }

    console.log("✅ ADMIN VERIFIED");

    document.getElementById('user-email').innerText =
      `Logged in as: ${session.user.email} (Admin)`;
  }

  checkAuth();

  // Logout button
  document.getElementById('logout').addEventListener('click', async () => {
    console.log("Logging out...");
    await supabaseClient.auth.signOut();
    console.log("Logged out");
  });
</script>

</body>
</html>
