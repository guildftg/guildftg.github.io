<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center">

  <h1>Welcome to the Dashboard</h1>
  <p id="user-email"></p>
  <button id="logout" class="btn btn-danger mt-3">Log Out</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient(
    "https://dyshoztfbpgpanqsyveg.supabase.co",
    "sb_publishable_gNVVkMuQLdkmeN5U_kJr4w_8qEkn-Jx"
  );

  async function checkAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      // Not logged in → redirect
      window.location.href = '/login';
      return;
    }

    const userId = session.user.id;

    // 🔒 Check role in profiles table
    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', userId)
      .single();

    if (error || !profile) {
      console.error('Profile fetch error:', error);
      window.location.href = '/login';
      return;
    }

    if (profile.role !== 'admin') {
      // 🚫 Not an admin → block access
      alert('Access denied: Admins only.');
      window.location.href = '/';
      return;
    }

    // ✅ Authorized admin
    document.getElementById('user-email').innerText =
      `Logged in as: ${session.user.email} (Admin)`;
  }

  checkAuth();

  // Logout button
  document.getElementById('logout').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = '/login';
  });
</script>
  </script>

</body>
</html>
