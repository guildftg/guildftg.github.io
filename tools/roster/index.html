  <h1 class="mb-4 text-center">TBC Guild Roster Dashboard</h1>

  <!-- CSV Input -->
  <div class="card p-3 mb-4" id="inputCard">
    <h5><a href="https://www.curseforge.com/wow/addons/guildrosterexport">Paste Roster CSV from GuildRosterExport Addon</a></h5>
    <p class="small text-muted">After installing addon do /guildrosterexport</p>

    <textarea id="csvInput" class="form-control mb-3" rows="6"></textarea>

    <button class="btn btn-primary mb-3" onclick="processCSV()">Load Data</button>
  </div>

  <!-- Filters -->
  <div class="card p-3 mb-4">
    <h5>Filters</h5>

    <div class="row g-3">
      <div class="col-md-6">
        <label>Class</label>
        <select id="classFilter" class="form-select">
          <option value="">All</option>
        </select>
      </div>

      <div class="col-md-6 d-flex align-items-end">
        <button class="btn btn-success w-100" onclick="applyFilters()">Apply</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="row mb-4" id="statsRow"></div>

  <!-- Charts -->
  <div class="row">

    <div class="col-lg-4 mb-4">
      <div class="card p-3">
        <h5>Class Distribution (Pie)</h5>
        <canvas id="classChart"></canvas>
      </div>
    </div>

    <div class="col-lg-4 mb-4">
      <div class="card p-3">
        <h5>Class Distribution (Bar)</h5>
        <canvas id="classBarChart"></canvas>
      </div>
    </div>

  </div>

  <div class="card p-3 mb-4">
    <h6>Filter by Class / Spec</h6>
    <div class="mb-3" id="filterSelector"></div>

    <div class="table-responsive">
      <table class="table table-sm table-striped">
        <thead>
          <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Spec</th>
            <th>Level</th>
            <th>Rank</th>
          </tr>
        </thead>
        <tbody id="rosterTable"></tbody>
      </table>
    </div>
  </div>

</div>

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += char;
    }
  }

  result.push(current);
  return result.map(v => v.trim());
}

function processCSV() {
  const text = document.getElementById("csvInput").value.trim();
  if (!text) return alert("Paste CSV first");

  document.getElementById("inputCard").style.display = "none";

  const lines = text.split(/\r?\n/);
  roster = [];

  for (let line of lines) {
    if (!line.trim()) continue;

    const parts = parseCSVLine(line);
    if (parts.length < 5) continue;

    if (parts[0].toLowerCase() === "name") continue;

    const name = parts[0];
    const rankName = parts[1];
    const rankIndex = Number(parts[2]) || 0;
    const level = Number(parts[3]) || 0;
    const playerClass = parts[4];

    const clsLower = playerClass.toLowerCase();

    let spec = SPEC_MAP[name];

    if (!spec) {
      spec = "unknown";
    }

    roster.push({
      name,
      rankName,
      rankIndex,
      level,
      class: playerClass,
      spec
    });
  }

  populateClassFilter();
  applyFilters();
  generateFilters();
}

function populateClassFilter() {
  const select = document.getElementById("classFilter");
  const classes = [...new Set(roster.map(r => r.class))].sort();

  select.innerHTML = '<option value="">All</option>';

  classes.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

function applyFilters() {
  const classFilter = document.getElementById("classFilter").value;

  filteredRoster = roster.filter(r =>
    r.level >= 70 &&
    (classFilter === "" || r.class === classFilter)
  );

  renderStats();
  renderCharts();
  generateFilters();
}

function generateFilters() {
  const selectorDiv = document.getElementById("filterSelector");
  selectorDiv.innerHTML = '';

  const grouped = {};

  filteredRoster.forEach(p => {
    const key = `${p.class} / ${p.spec}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(p);
  });

  Object.keys(grouped).sort().forEach(key => {
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'filter';
    radio.value = key;
    radio.onchange = () => renderTable(key);

    const label = document.createElement('label');
    label.className = 'me-3';
    label.appendChild(radio);
    label.appendChild(document.createTextNode(' ' + key));

    selectorDiv.appendChild(label);
  });

  renderTable(null);
}

function renderTable(key) {
  let data = filteredRoster;

  if (key) {
    const [cls, spec] = key.split(' / ');
    data = filteredRoster.filter(p => p.class === cls && p.spec === spec);
  }

  const tbody = document.getElementById("rosterTable");
  tbody.innerHTML = "";

  data.forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.name}</td>
      <td>${p.class}</td>
      <td>${p.spec}</td>
      <td>${p.level}</td>
      <td>${p.rankName}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderStats() {
  const row = document.getElementById("statsRow");
  row.innerHTML = "";

  const total = roster.length;
  const level70 = filteredRoster.filter(r => r.level === 70).length;

  const stats = [
    { label: "Players", value: total },
    { label: "Level 70", value: level70 }
  ];

  stats.forEach(s => {
    const div = document.createElement("div");
    div.className = "col-md-3 mb-3";

    div.innerHTML = `
      <div class="card p-3 text-center">
        <h4>${s.value}</h4>
        <div class="small text-muted">${s.label}</div>
      </div>
    `;

    row.appendChild(div);
  });
}

function renderCharts() {
  const counts = {};
  filteredRoster.forEach(r => {
    const c = r.class;
    counts[c] = (counts[c] || 0) + 1;
  });

  const labels = Object.keys(counts);
  const data = Object.values(counts);

  if (classChart) classChart.destroy();
  if (classBarChart) classBarChart.destroy();

  classChart = new Chart(document.getElementById("classChart"), {
    type: "pie",
    data: { labels, datasets: [{ data }] }
  });

  classBarChart = new Chart(document.getElementById("classBarChart"), {
    type: "bar",
    data: { labels, datasets: [{ data }] }
  });
}
