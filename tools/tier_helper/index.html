<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GP Award Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background:#111; color:#eee; }

  .grid-5 {
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:6px;
  }

  textarea, input {
    background:#222 !important;
    color:#eee !important;
  }

  .card { background:#1b1b1b; }

  .selected-player {
    background:#0d6efd !important;
    color:white !important;
  }

  .selected-boss {
    background:#198754 !important;
    color:white !important;
  }
</style>
</head>

<body class="p-3">

<div class="container-fluid">

  <h3 class="mb-3">GP Award Tool</h3>

  <!-- IMPORT -->
  <div class="card p-3 mb-3">
    <label class="form-label">Import Players</label>
    <textarea id="playerInput" class="form-control" rows="3"></textarea>
    <button class="btn btn-primary mt-2" onclick="loadPlayers()">Load Players</button>
  </div>

  <!-- PLAYERS -->
  <div class="card p-3 mb-3">
    <h5>Players</h5>
    <div id="playerGrid" class="grid-5"></div>
  </div>

  <!-- BOSSES -->
  <div class="card p-3 mb-3">
    <h5>Bosses</h5>
    <div id="bossList"></div>
  </div>

  <!-- PRIORITY -->
  <div class="card p-3 mb-3">
    <h5>Priority</h5>

    <div class="btn-group" role="group">
      <input type="radio" class="btn-check" name="prio" id="os" value="OS" checked>
      <label class="btn btn-outline-warning" for="os">OS</label>

      <input type="radio" class="btn-check" name="prio" id="low" value="LOW">
      <label class="btn btn-outline-success" for="low">LOW</label>

      <input type="radio" class="btn-check" name="prio" id="med" value="MEDIUM">
      <label class="btn btn-outline-info" for="med">MEDIUM</label>

      <input type="radio" class="btn-check" name="prio" id="high" value="HIGH">
      <label class="btn btn-outline-danger" for="high">HIGH</label>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="card p-3">
    <h5>Command</h5>
    <input id="output" class="form-control mb-2" readonly>
    <button class="btn btn-success" onclick="copyCmd()">Copy</button>
  </div>

</div>

<script>
const bosses = [
  { dungeon:"Gruul+Mag", boss:"Maulgar", item:"T4 Shoulders", OS:6, LOW:12, MEDIUM:18, HIGH:24 },
  { dungeon:"Gruul+Mag", boss:"Gruul", item:"T4 Legs", OS:6, LOW:12, MEDIUM:18, HIGH:24 },
  { dungeon:"Gruul+Mag", boss:"Magtheridon", item:"T4 Chest", OS:6, LOW:12, MEDIUM:18, HIGH:24 },
  { dungeon:"Serpentshrine Cavern", boss:"Leotheras", item:"T5 Gloves", OS:6, LOW:13, MEDIUM:19, HIGH:26 },
  { dungeon:"Serpentshrine Cavern", boss:"Fathom Lord", item:"T5 Legs", OS:9, LOW:17, MEDIUM:26, HIGH:34 },
  { dungeon:"Serpentshrine Cavern", boss:"Vashj", item:"T5 Helm", OS:9, LOW:17, MEDIUM:26, HIGH:34 },
  { dungeon:"Tempest Keep", boss:"Void Reaver", item:"T5 Shoulders", OS:9, LOW:17, MEDIUM:26, HIGH:34 },
  { dungeon:"Tempest Keep", boss:"Kael'thas", item:"T5 Chest", OS:9, LOW:17, MEDIUM:26, HIGH:34 },
  { dungeon:"Tempest Keep", boss:"Kael'thas", item:"Verdant Sphere", OS:10, LOW:20, MEDIUM:29, HIGH:39 }
];

let players = [];
let selectedPlayer = null;
let selectedBoss = null;

function loadPlayers() {
  const raw = document.getElementById("playerInput").value;
  const match = raw.split("import")[1] || raw;
  players = match.split(";").map(p => p.trim()).filter(Boolean);

  const grid = document.getElementById("playerGrid");
  grid.innerHTML = "";

  players.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "btn btn-outline-light btn-sm";
    btn.innerText = p;

    btn.onclick = () => {
      selectedPlayer = p;

      // highlight
      document.querySelectorAll("#playerGrid button").forEach(b => {
        b.classList.remove("selected-player");
      });
      btn.classList.add("selected-player");

      update();
    };

    grid.appendChild(btn);
  });
}

function loadBosses() {
  const container = document.getElementById("bossList");

  bosses.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "btn btn-outline-secondary btn-sm w-100 text-start mb-1";
    btn.innerText = `${b.dungeon} - ${b.boss} (${b.item})`;

    btn.onclick = () => {
      selectedBoss = b;

      document.querySelectorAll("#bossList button").forEach(x => {
        x.classList.remove("selected-boss");
      });
      btn.classList.add("selected-boss");

      update();
    };

    container.appendChild(btn);
  });
}

function getPriority() {
  return document.querySelector('input[name="prio"]:checked').value;
}

// 🔥 central update (NOW ALWAYS RUNS)
function update() {
  if (!selectedPlayer || !selectedBoss) return;

  const prio = getPriority();
  const value = selectedBoss[prio];

  const cmd = `/awardgp ${selectedPlayer} ${value} ${selectedBoss.item} ${prio}`;
  document.getElementById("output").value = cmd;
}

// 🔥 THIS WAS MISSING BEFORE
document.querySelectorAll('input[name="prio"]').forEach(r => {
  r.addEventListener("change", update);
});

function copyCmd() {
  const box = document.getElementById("output");
  box.select();
  document.execCommand("copy");
}

// init
loadBosses();
</script>

</body>
</html>
