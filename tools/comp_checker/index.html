<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raid Composition Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container py-4">
    <h1 class="mb-4">Raid Composition Viewer</h1>

    <!-- Event ID Input -->
    <div class="input-group mb-3">
        <input type="text" id="eventId" class="form-control" placeholder="Enter Event ID">
        <button class="btn btn-primary" onclick="showLink()">Get Event Link</button>
    </div>

    <!-- Event Link -->
    <div id="eventLink" class="mb-3"></div>

    <!-- JSON Input -->
    <div class="mb-3">
        <label for="jsonInput" class="form-label">Paste Event JSON here:</label>
        <textarea id="jsonInput" class="form-control" rows="10" placeholder="Paste JSON here"></textarea>
    </div>
    <button class="btn btn-success mb-4" onclick="renderRaidFromTextarea()">Render Raid</button>

    <!-- Output -->
    <div id="output"></div>
</div>

<script>
function showLink() {
    const eventId = document.getElementById("eventId").value.trim();
    const linkDiv = document.getElementById("eventLink");
    if (!eventId) return;

    linkDiv.innerHTML = `
        <p>
            Visit the event page: 
            <a href="https://raid-helper.dev/raidplan/${eventId}" target="_blank" class="text-info">
                https://raid-helper.dev/raidplan/${eventId}
            </a>
        </p>
        <p>After copying the JSON from that page, paste it below and click "Render Raid".</p>
    `;
}

function renderRaidFromTextarea() {
    const jsonText = document.getElementById("jsonInput").value.trim();
    if (!jsonText) return alert("Please paste the JSON first.");

    let data;
    try {
        data = JSON.parse(jsonText);
    } catch (err) {
        return alert("Invalid JSON: " + err.message);
    }

    renderRaid(data);
}

function renderRaid(data) {
    const output = document.getElementById("output");
    output.innerHTML = "";

    const slots = data.slots;
    const dividers = data.dividers || [];

    // Group slots by groupNumber
    const groups = {};
    slots.forEach(slot => {
        if (!groups[slot.groupNumber]) groups[slot.groupNumber] = [];
        groups[slot.groupNumber].push(slot);
    });

    // Sort groups numerically
    const sortedGroupNumbers = Object.keys(groups).map(Number).sort((a, b) => a - b);

    // Determine divider ranges (Charlie, Delta, etc.)
    function getDividerName(groupNum) {
        let current = "Raid";
        for (let i = 0; i < dividers.length; i++) {
            if (groupNum >= dividers[i].position) current = dividers[i].name;
        }
        return current;
    }

    let currentDivider = null;
    let container = null;

    sortedGroupNumbers.forEach(groupNum => {
        const dividerName = getDividerName(groupNum);

        // New raid section
        if (dividerName !== currentDivider) {
            currentDivider = dividerName;

            const section = document.createElement("div");
            section.className = "mb-5";

            const title = document.createElement("h3");
            title.textContent = dividerName + " Group";
            title.className = "text-info mb-3";

            section.appendChild(title);

            container = document.createElement("div");
            section.appendChild(container);

            output.appendChild(section);
        }

        const group = groups[groupNum];
        group.sort((a, b) => a.slotNumber - b.slotNumber);

        const row = document.createElement("div");
        row.className = "row mb-2";

        group.forEach(player => {
            const col = document.createElement("div");
            col.className = "col-md-2 col-6";

            col.innerHTML = `
                <div class="card bg-secondary text-light p-2 text-center">
                    <div><strong>${player.name}</strong></div>
                    <div style="color:${player.color}">
                        ${player.className} (${player.specName})
                    </div>
                </div>
            `;
            row.appendChild(col);
        });

        container.appendChild(row);
    });
}
</script>

</body>
</html>
