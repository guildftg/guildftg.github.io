<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Raid Comparator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    padding: 20px;
}
input {
    padding: 10px;
    width: 250px;
    margin-right: 10px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: white;
}
button {
    padding: 10px 20px;
    cursor: pointer;
}
.output {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}
textarea {
    width: 100%;
    height: 600px;
    background: #111;
    color: white;
    border: 1px solid #444;
    padding: 10px;
}
.section {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>Raid Signup Comparator</h2>

<input id="event1" placeholder="Event ID #1">
<input id="event2" placeholder="Event ID #2">
<button onclick="runCompare()">Compare Events</button>

<div class="output">
    <div style="flex:1;">
        <h3>First Only</h3>
        <textarea id="firstOnly" readonly></textarea>
    </div>
    <div style="flex:1;">
        <h3>Mutual</h3>
        <textarea id="mutual" readonly></textarea>
    </div>
    <div style="flex:1;">
        <h3>Second Only</h3>
        <textarea id="secondOnly" readonly></textarea>
    </div>
</div>

<script>
async function fetchEvent(eventId) {
    const url = `https://raid-helper.dev/api/v2/events/${eventId}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);

    return await res.json();
}

function extractData(data) {
    const active = [];
    const absent = [];

    if (!data.signUps) return { active, absent };

    data.signUps.forEach(s => {
        if (!s.name) return;

        const isAbsent =
            s.className === "Absence" ||
            s.roleName === "Absence" ||
            s.specName === "Absence";

        if (isAbsent) absent.push(s.name);
        else active.push(s.name);
    });

    return { active, absent };
}

async function runCompare() {
    const id1 = document.getElementById("event1").value.trim();
    const id2 = document.getElementById("event2").value.trim();

    if (!id1 || !id2) {
        alert("Enter both event IDs");
        return;
    }

    try {
        const [event1, event2] = await Promise.all([
            fetchEvent(id1),
            fetchEvent(id2)
        ]);

        const data1 = extractData(event1);
        const data2 = extractData(event2);

        const set1 = new Set(data1.active);
        const set2 = new Set(data2.active);

        const firstOnly = [...set1].filter(n => !set2.has(n)).sort();
        const mutual = [...set1].filter(n => set2.has(n)).sort();
        const secondOnly = [...set2].filter(n => !set1.has(n)).sort();

        document.getElementById("firstOnly").value = firstOnly.join("\n");
        document.getElementById("mutual").value = mutual.join("\n");
        document.getElementById("secondOnly").value = secondOnly.join("\n");

        // Absence tracking
        const absent1 = new Set(data1.absent);
        const absent2 = new Set(data2.absent);

        const becameAbsent = [...absent2].filter(n => !absent1.has(n));
        const returned = [...absent1].filter(n => !absent2.has(n));
        
</script>

</body>
</html>
