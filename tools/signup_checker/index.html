<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multi Event Comparator</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #1e1e1e;
    color: #ffffff;
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #2a2a2a;
    color: #ffffff;
    border: 1px solid #444;
}
button {
    padding: 8px 15px;
    font-size: 14px;
    cursor: pointer;
    margin: 5px 5px 15px 0;
}
.output {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}
textarea {
    width: 100%;
    height: 200px;
    background: #2a2a2a;
    color: #ffffff;
    border: 1px solid #444;
    padding: 10px;
}
.box {
    flex: 1;
    min-width: 250px;
}
.input-block {
    border: 1px solid #444;
    padding: 10px;
    margin-bottom: 10px;
}
</style>
</head>
<body>

<h2>Multi Event Signup Comparator</h2>

<div id="inputs"></div>

<button onclick="addInput()">➕ Add Event</button>
<button onclick="compare()">Compare All</button>

<h3>Minimum Overlap Threshold</h3>
<input type="number" id="threshold" value="2" min="1">

<div class="output">
    <div class="box">
        <h3>Present in ALL</h3>
        <textarea id="allShared" readonly></textarea>
    </div>
    <div class="box">
        <h3>Present in ≥ Threshold</h3>
        <textarea id="thresholdShared" readonly></textarea>
    </div>
</div>

<div id="uniqueOutputs" class="output"></div>

<script>
let inputCount = 0;

function addInput() {
    inputCount++;

    const div = document.createElement("div");
    div.className = "input-block";
    div.innerHTML = `
        <h3>Event ${inputCount}</h3>
        <input class="eventId" placeholder="Enter Event ID">
        <button onclick="this.parentElement.remove()">❌ Remove</button>
    `;

    document.getElementById("inputs").appendChild(div);
}

addInput();
addInput();

function formatDate(dateStr) {
    if (!dateStr) return "Unknown Date";
    const [day, month, year] = dateStr.split("-").map(Number);
    const date = new Date(year, month - 1, day);
    return date.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric"
    });
}

async function fetchEvent(eventId) {
    const url = `https://raid-helper.dev/api/v2/events/${eventId}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
}

async function compare() {
    const inputs = document.querySelectorAll(".eventId");

    const nameLists = [];
    const labels = [];
    const frequency = new Map();

    for (const input of inputs) {
        const eventId = input.value.trim();
        if (!eventId) continue;

        try {
            const data = await fetchEvent(eventId);

            const parsedDate = formatDate(data.date);

            const names = (data.signUps || [])
                .filter(s =>
                    typeof s.name === "string" &&
                    s.status === "primary" &&
                    !["Tentative", "Late", "Absence"].includes(s.className)
                )
                .map(s => s.name);

            const set = new Set(names);

            nameLists.push(set);
            labels.push(parsedDate);

            set.forEach(name => {
                frequency.set(name, (frequency.get(name) || 0) + 1);
            });

        } catch (e) {
            console.error("Failed event:", eventId, e);
        }
    }

    const totalLists = nameLists.length;
    const threshold = parseInt(document.getElementById("threshold").value) || 2;

    const allShared = [...frequency.entries()]
        .filter(([_, count]) => count === totalLists)
        .map(([name]) => name)
        .sort();

    const thresholdShared = [...frequency.entries()]
        .filter(([_, count]) => count >= threshold)
        .map(([name]) => name)
        .sort();

    document.getElementById("allShared").value = allShared.join("\n");
    document.getElementById("thresholdShared").value = thresholdShared.join("\n");

    const uniqueContainer = document.getElementById("uniqueOutputs");
    uniqueContainer.innerHTML = "";

    nameLists.forEach((set, index) => {
        const unique = [...set]
            .filter(name => frequency.get(name) === 1)
            .sort();

        const div = document.createElement("div");
        div.className = "box";
        div.innerHTML = `
            <h3>Unique to ${labels[index]}</h3>
            <textarea readonly>${unique.join("\n")}</textarea>
        `;
        uniqueContainer.appendChild(div);
    });
}
</script>

</body>
</html>
