<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Name Comparator</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #1e1e1e;
    color: #ffffff;
}
textarea {
    width: 100%;
    height: 200px;
    margin-bottom: 15px;
    background: #2a2a2a;
    color: #ffffff;
    border: 1px solid #444;
    padding: 10px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 20px;
}
.output {
    display: flex;
    gap: 20px;
}
.output textarea {
    height: 250px;
}
h3 {
    margin-bottom: 5px;
}
</style>
</head>
<body>

<h2>JSON Signup Name Comparator</h2>

<h3>First JSON</h3>
<textarea id="json1" placeholder="Paste first JSON here"></textarea>

<h3>Second JSON</h3>
<textarea id="json2" placeholder="Paste second JSON here"></textarea>

<button onclick="compare()">Compare</button>

<div class="output">
    <div style="flex:1;">
        <h3>First Only</h3>
        <textarea id="firstOnly" readonly></textarea>
    </div>
    <div style="flex:1;">
        <h3>Mutual</h3>
        <textarea id="mutual" readonly></textarea>
    </div>
    <div style="flex:1;">
        <h3>Second Only</h3>
        <textarea id="secondOnly" readonly></textarea>
    </div>
</div>

<script>
function extractNames(jsonText) {
    try {
        const data = JSON.parse(jsonText);
        if (!data.signUps || !Array.isArray(data.signUps)) return { active: [], absent: [] };

        const active = [];
        const absent = [];

        data.signUps.forEach(s => {
            if (typeof s.name !== "string") return;

            // Detect absence
            const isAbsent =
                s.className === "Absence" ||
                s.roleName === "Absence" ||
                s.specName === "Absence";

            if (isAbsent) {
                absent.push(s.name);
            } else {
                active.push(s.name);
            }
        });

        return { active, absent };

    } catch (e) {
        alert("Invalid JSON detected.");
        throw e;
    }
}

function compare() {
    const names1 = extractNames(document.getElementById("json1").value);
    const names2 = extractNames(document.getElementById("json2").value);

    const set1 = new Set(names1.active);
    const set2 = new Set(names2.active);

    const firstOnly = [...set1].filter(n => !set2.has(n)).sort();
    const mutual = [...set1].filter(n => set2.has(n)).sort();
    const secondOnly = [...set2].filter(n => !set1.has(n)).sort();

    document.getElementById("firstOnly").value = firstOnly.join("\n");
    document.getElementById("mutual").value = mutual.join("\n");
    document.getElementById("secondOnly").value = secondOnly.join("\n");
}
</script>

</body>
</html>
