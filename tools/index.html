<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FTG Tools</title>

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  />
</head>

<body class="bg-light">

  <div class="container mt-5">
    <h2 class="mb-4">FTG Tools</h2>

    <!-- List container -->
    <div id="wowLinks" class="list-group"></div>
  </div>

  <script>
    const wowLinks = [
      { url: "/tools/signup_checker", text: "Multi Signup Checker" },
      { url: "/tools/comp_checker", text: "Roster Validator" },
      { url: "/tools/quest_counter", text: "Quest Submissions" },
      { url: "/tools/quest_audit", text: "CLM Quest Auditor" },
      { url: "/tools/clm", text: "CLM Points Dashboard" },
      { url: "/tools/roster", text: "Guild Roster Dashboard" },
      { url: "/tools/weakauras/CLM_Start_Raid_Reminder", text: "[WeakAura] CLM Start Raid Reminder" },
      { url: "/tools/weakauras/Master_Looter_FTG_Raids", text: "[WeakAura] Master Looter FTG Raids" },
    ];

    // Render full list
    function renderWoWList() {
      const container = document.getElementById("wowLinks");
      container.innerHTML = "";

      wowLinks.forEach(link => {
        const a = document.createElement("a");
        a.href = link.url;
        a.textContent = link.text;
        a.target = "_blank";
        a.className = "list-group-item list-group-item-action";
        container.appendChild(a);
      });
    }

    // Initial load
    window.addEventListener("DOMContentLoaded", renderWoWList);
  </script>

</body>
</html>
