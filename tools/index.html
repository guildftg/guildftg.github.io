<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FTG Tools</title>

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  />
</head>

<body class="bg-light">

  <div class="container mt-5">
    <h2 class="mb-4">FTG Tools</h2>

    <!-- List container -->
    <div id="wowLinks" class="list-group"></div>
  </div>

  <script>
    const BASE_EDIT_URL = "https://github.com/guildftg/guildftg.github.io/edit/";

    const wowLinks = [
      { url: "/tools/signup_checker", edit_url: "main/tools/signup_checker/index.html", text: "Multi Signup Checker" },
      { url: "/tools/comp_checker", edit_url: "main/tools/comp_checker/index.html", text: "Roster Validator" },
      { url: "/tools/quest_counter", edit_url: "main/tools/quest_counter/index.html", text: "Quest Submissions" },
      { url: "/tools/quest_audit", edit_url: "main/tools/quest_audit/index.html", text: "CLM Quest Auditor" },
      { url: "/tools/clm", edit_url: "main/tools/clm/index.html", text: "CLM Points Dashboard" },
      { url: "/tools/roster", edit_url: "main/tools/roster/index.html", text: "Guild Roster Dashboard" },
      { url: "/tools/weakauras/CLM_Start_Raid_Reminder.txt", edit_url: "main/tools/weakauras/CLM_Start_Raid_Reminder.txt", text: "[WeakAura] CLM Start Raid Reminder" },
      { url: "/tools/weakauras/Master_Looter_FTG_Raids.txt", edit_url: "main/tools/weakauras/Master_Looter_FTG_Raids.txt", text: "[WeakAura] Master Looter FTG Raids" },
    ];

    // Render full list
    function renderWoWList() {
      const container = document.getElementById("wowLinks");
      container.innerHTML = "";

      wowLinks.forEach(link => {
        const item = document.createElement("div");
        item.className = "list-group-item d-flex justify-content-between align-items-center";

        const mainLink = document.createElement("a");
        mainLink.href = link.url;
        mainLink.textContent = link.text;
        mainLink.target = "_blank";

        const editBtn = document.createElement("a");
        editBtn.href = BASE_EDIT_URL + link.edit_url;
        editBtn.textContent = "Edit";
        editBtn.target = "_blank";
        editBtn.className = "btn btn-sm btn-outline-secondary";

        item.appendChild(mainLink);
        item.appendChild(editBtn);

        container.appendChild(item);
      });
    }

    // Initial load
    window.addEventListener("DOMContentLoaded", renderWoWList);
  </script>

</body>
</html>
