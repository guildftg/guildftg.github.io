<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FTG Early Leave EP Calculator</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>

</head>

<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 class="mb-4">FTG – Early Leave EP Calculator</h2>

  <div class="card bg-secondary text-white p-4">

    <div class="form-group">
      <label>Raid Start Time (Server Time UTC+7)</label>
      <input type="time" id="startTime" class="form-control" value="18:30">
    </div>

    <div class="form-group">
      <label>Raid End Time (Server Time UTC+7)</label>
      <input type="time" id="endTime" class="form-control" value="21:00">
    </div>

    <div class="form-group">
      <label>Raid EP Value</label>
      <input type="number" id="epValue" class="form-control" value="50">
    </div>

    <div class="form-group">
      <label>Time Player Left (Server Time UTC+7)</label>
      <input type="time" id="leaveTime" class="form-control">
    </div>

    <button class="btn btn-warning mt-3" onclick="calculateEP()">Calculate</button>

    <hr>

    <h4>Result</h4>
    <div id="result"></div>

  </div>
</div>

<script>
function timeToMinutes(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
}

function calculateEP() {
    let start = timeToMinutes(document.getElementById("startTime").value);
    let end = timeToMinutes(document.getElementById("endTime").value);
    let leave = timeToMinutes(document.getElementById("leaveTime").value);
    let epTotal = parseFloat(document.getElementById("epValue").value);

    // invalid guard
    if (isNaN(leave)) {
        document.getElementById("result").innerHTML = "Enter leave time";
        return;
    }

    // clamp leave time
    if (leave < start) leave = start;
    if (leave > end) leave = end;

    let totalDuration = end - start;
    let attendedDuration = leave - start;

    let ratio = attendedDuration / totalDuration;
    let earnedEP = ratio * epTotal;

    document.getElementById("result").innerHTML =
        `<b>Attendance:</b> ${(ratio * 100).toFixed(2)}%<br>` +
        `<b>Earned EP:</b> ${earnedEP.toFixed(2)}`;
}
</script>

</body>
</html>
