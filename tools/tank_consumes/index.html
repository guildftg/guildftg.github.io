<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tank Consumable Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .card {
            margin-bottom: 20px;
        }

        table td,
        table th {
            vertical-align: middle;
        }

        .money {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container my-4">

    <h1 class="mb-4">Tank Consumable Material Calculator</h1>

    <div class="card">
        <div class="card-header">
            Raid Configuration
        </div>
        <div class="card-body">

            <div class="row">

                <div class="col-md-3">
                    <label class="form-label">Weeks</label>
                    <input id="weeks" type="number" class="form-control" value="1" min="1">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Paladin Tanks</label>
                    <input id="paladins" type="number" class="form-control" value="0" min="0">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Warrior Tanks</label>
                    <input id="warriors" type="number" class="form-control" value="0" min="0">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Druid Tanks</label>
                    <input id="druids" type="number" class="form-control" value="0" min="0">
                </div>

            </div>
        </div>
    </div>

    <div id="tankConfigs"></div>

    <div class="card">
        <div class="card-header">
            Auction House Prices
        </div>
        <div class="card-body">
            <div class="row" id="priceInputs"></div>
        </div>
    </div>

    <button class="btn btn-primary mb-4" onclick="calculate()">
        Calculate
    </button>

    <div id="results"></div>

</div>

<script>

const consumables = {
    "Flask of Blinding Light": {
        perWeek: 2,
        materials: {
            "Fel Lotus": 1,
            "Mana Thistle": 3,
            "Netherbloom": 7,
            "Imbued Vial": 1
        }
    },

    "Flask of Fortification": {
        perWeek: 2,
        materials: {
            "Fel Lotus": 1,
            "Mana Thistle": 3,
            "Ancient Lichen": 7,
            "Imbued Vial": 1
        }
    },

    "Greater Arcane Elixir": {
        perWeek: 10,
        materials: {
            "Dreamfoil": 3,
            "Mountain Silversage": 1,
            "Crystal Vial": 1
        }
    },

    "Gift of Arthas": {
        perWeek: 10,
        materials: {
            "Arthas Tears": 1,
            "Blindweed": 1,
            "Crystal Vial": 1
        }
    },

    "Elixir of Fortitude": {
        perWeek: 10,
        materials: {
            "Ragveil": 2,
            "Felweed": 1,
            "Imbued Vial": 1
        }
    },

    "Agility Elixir": {
        perWeek: 10,
        materials: {
            "Terocone": 1,
            "Felweed": 2,
            "Imbued Vial": 1
        }
    }
};

const tankTypes = [
    "Paladin",
    "Warrior",
    "Druid"
];

function buildTankConfigs() {

    let html = "";

    tankTypes.forEach(type => {

        html += `
        <div class="card">
            <div class="card-header">${type} Consumables</div>
            <div class="card-body">
        `;

        Object.keys(consumables).forEach(consumable => {

            html += `
                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="${type}_${consumable}">
                    <label class="form-check-label">
                        ${consumable}
                    </label>
                </div>
            `;
        });

        html += `
            </div>
        </div>
        `;
    });

    document.getElementById("tankConfigs").innerHTML = html;
}

function buildPriceInputs() {

    const materials = new Set();

    Object.values(consumables).forEach(c => {
        Object.keys(c.materials).forEach(m => materials.add(m));
    });

    let html = "";

    materials.forEach(material => {

        html += `
        <div class="col-md-3 mb-3">
            <label class="form-label">${material}</label>
            <input
                type="number"
                step="0.01"
                value="0"
                id="price_${material}"
                class="form-control">
        </div>
        `;
    });

    document.getElementById("priceInputs").innerHTML = html;
}

function calculate() {

    const weeks = Number(document.getElementById("weeks").value);

    const tankCounts = {
        Paladin: Number(document.getElementById("paladins").value),
        Warrior: Number(document.getElementById("warriors").value),
        Druid: Number(document.getElementById("druids").value)
    };

    let grandTotalCost = 0;

    const totalMaterials = {};
    const itemRows = [];

    tankTypes.forEach(type => {

        const tankCount = tankCounts[type];

        Object.entries(consumables).forEach(([name, info]) => {

            const checked =
                document.getElementById(`${type}_${name}`).checked;

            if (!checked)
                return;

            const quantity =
                tankCount *
                weeks *
                info.perWeek;

            let itemCost = 0;

            Object.entries(info.materials).forEach(([material, amount]) => {

                const totalAmount = amount * quantity;

                totalMaterials[material] =
                    (totalMaterials[material] || 0) + totalAmount;

                const price =
                    Number(
                        document.getElementById(
                            `price_${material}`
                        ).value
                    ) || 0;

                itemCost += totalAmount * price;
            });

            grandTotalCost += itemCost;

            itemRows.push({
                tank: type,
                item: name,
                quantity,
                cost: itemCost
            });

        });

    });

    let html = "";

    html += `
    <div class="card">
        <div class="card-header">
            Consumable Totals
        </div>

        <div class="card-body">

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Tank Type</th>
                    <th>Consumable</th>
                    <th>Total Needed</th>
                    <th>Cost</th>
                </tr>
            </thead>
            <tbody>
    `;

    itemRows.forEach(r => {

        html += `
        <tr>
            <td>${r.tank}</td>
            <td>${r.item}</td>
            <td>${r.quantity}</td>
            <td>${r.cost.toFixed(2)}</td>
        </tr>
        `;
    });

    html += `
            </tbody>
        </table>

        </div>
    </div>
    `;

    html += `
    <div class="card">
        <div class="card-header">
            Material Totals
        </div>

        <div class="card-body">

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Total Required</th>
                    <th>AH Price</th>
                    <th>Total Cost</th>
                </tr>
            </thead>
            <tbody>
    `;

    Object.entries(totalMaterials).forEach(([material, amount]) => {

        const price =
            Number(
                document.getElementById(
                    `price_${material}`
                ).value
            ) || 0;

        const cost = amount * price;

        html += `
        <tr>
            <td>${material}</td>
            <td>${amount}</td>
            <td>${price.toFixed(2)}</td>
            <td>${cost.toFixed(2)}</td>
        </tr>
        `;
    });

    html += `
            </tbody>
        </table>

        <h3 class="money">
            Grand Total Cost:
            ${grandTotalCost.toFixed(2)}
        </h3>

        </div>
    </div>
    `;

    document.getElementById("results").innerHTML = html;
}

buildTankConfigs();
buildPriceInputs();

</script>

</body>
</html>
